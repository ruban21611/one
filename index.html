<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>JOB APPLICATION App</title>

  <style>
 #install-overlay 
    {
      display: none; 
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center; 
      z-index: 9999;
    } 
    .install-card { background: #fff; padding: 1.5rem; 
                   border-radius: 12px; max-width: 320px; 
                   text-align: center; font-family: sans-serif; 
                   box-shadow: 0 8px 24px rgba(0,0,0,0.2); 
                  }
</style>
</head>
<body>
  <div id="install-overlay">
    <div class="install-card">
       <h2>Install This App</h2>
      
     <div id="install-overlay">
  <div class="install-card">
    <h2>Install This App</h2>
    
    <p>
      Use your browser’s <strong>Install App</strong> or
      <strong>Add to Home Screen</strong> option to install this PWA.
     
    </p>

    <div style="margin-top:1rem; display:flex; gap:10px; justify-content:center;">
     <button id="installBtn">Install</button>
     <button id="cancelBtn">Cancel</button>
    </div>
  </div>
</div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
let deferredPrompt = null;

const overlay = document.getElementById("install-overlay");
const installBtn = document.getElementById("installBtn");
const cancelBtn = document.getElementById("cancelBtn");

// Already installed check
const isInstalled =
  window.matchMedia("(display-mode: standalone)").matches ||
  window.navigator.standalone === true ||
  localStorage.getItem("appInstalled") === "true";

if (isInstalled) {
  overlay.style.display = "none";
}

// Install prompt event
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();

  if (localStorage.getItem("appInstalled") === "true") return;

  deferredPrompt = e;
  overlay.style.display = "flex";
});

// Install button
installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const choice = await deferredPrompt.userChoice;

  if (choice.outcome === "accepted") {
    localStorage.setItem("appInstalled", "true");
  }

  deferredPrompt = null;
  overlay.style.display = "none";
});

// Installed successfully
window.addEventListener("appinstalled", () => {
  localStorage.setItem("appInstalled", "true");
  deferredPrompt = null;
  overlay.style.display = "none";
});

// Cancel button
cancelBtn.addEventListener("click", () => {
  overlay.style.display = "none";
});
</script>

    
</body>
</html>
