<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>JOB APPLICATION App</title>

  <style>
    #install-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .install-card {
      background: #fff;
      padding: 1.5rem;
      border-radius: 12px;
      max-width: 320px;
      text-align: center;
      font-family: sans-serif;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div id="install-overlay">
    <div class="install-card">
      <h2>Install This App</h2>
     <div id="install-overlay">
  <div class="install-card">
    <h2>Install This App</h2>
    <p>
      Use your browser’s <strong>Install App</strong> or
      <strong>Add to Home Screen</strong> option to install this PWA.
      (The actual install prompt cannot be triggered without JavaScript.)
    </p>

    <div style="margin-top:1rem; display:flex; gap:0.75rem; justify-content:center;">
     <button id="installBtn" type="button">Install</button>
<button id="cancelBtn" type="button">Cancel</button>
    </div>
  </div>
</div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
  let deferredPrompt = null;

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault(); // Browser-oda default mini-infobar-a stop pannum
    deferredPrompt = e;

    // Inga unga overlay-a show pannunga
    document.getElementById("install-overlay").style.display = "flex";
  });

  document.getElementById("installBtn").addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();
    await deferredPrompt.userChoice;

    deferredPrompt = null;
    document.getElementById("install-overlay").style.display = "none";
  });

  document.getElementById("cancelBtn").addEventListener("click", () => {
    document.getElementById("install-overlay").style.display = "none";
  });
</script>
</body>
</html>
