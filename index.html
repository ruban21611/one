<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="apple-touch-icon" href="/icon-192.png">

<title>Job Application App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f5f7fb;
}

/* React Root */
#root{
min-height:100vh;
}

/* ========================= */
/* INSTALL POPUP */
/* ========================= */

#installOverlay{
position:fixed;
left:0;
right:0;
top:0;
bottom:0;

display:none;

justify-content:center;
align-items:flex-end;

background:rgba(0,0,0,.6);

z-index:9999;
}

.installBox{

width:100%;
max-width:420px;

background:#fff;

border-radius:25px 25px 0 0;

padding:30px;

text-align:center;

animation:slideUp .35s ease;

}

@keyframes slideUp{

from{
transform:translateY(100%);
opacity:0;
}

to{
transform:translateY(0);
opacity:1;
}

}

.logo{

width:90px;
height:90px;

margin:auto;

background:#2563eb;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:45px;

color:white;

box-shadow:0 8px 25px rgba(37,99,235,.3);

margin-bottom:20px;

}

.installBox h2{

font-size:28px;
color:#222;
margin-bottom:10px;

}

.installBox p{

color:#666;
line-height:1.7;
margin-bottom:25px;

}

.features{

display:flex;
justify-content:space-around;
margin-bottom:25px;

}

.feature{

font-size:14px;
color:#555;

}

.buttons{

display:flex;
gap:12px;

}

.buttons button{

flex:1;

padding:14px;

font-size:16px;

border:none;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

#cancelBtn{

background:#ececec;

}

#cancelBtn:hover{

background:#dcdcdc;

}

#installBtn{

background:#2563eb;
color:white;

}

#installBtn:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<!-- INSTALL POPUP -->

<div id="installOverlay">

<div class="installBox">

<div class="logo">
💼
</div>

<h2>Install Job App</h2>

<p>
Install this Job Application App for a faster,
better and offline experience.
</p>

<div class="features">

<div class="feature">
⚡ Fast
</div>

<div class="feature">
📶 Offline
</div>

<div class="feature">
🔔 Notifications
</div>

</div>

<div class="buttons">

<button id="cancelBtn">
Later
</button>

<button id="installBtn">
Install
</button>

</div>

</div>

</div>

<!-- React App -->

<div id="root"></div>

<script type="module" src="/src/main.tsx"></script>

<script>

let deferredPrompt;

const overlay=document.getElementById("installOverlay");
const installBtn=document.getElementById("installBtn");
const cancelBtn=document.getElementById("cancelBtn");

function appInstalled(){

return window.matchMedia("(display-mode: standalone)").matches
|| localStorage.getItem("jobAppInstalled")=="true";

}

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

if(appInstalled()) return;

deferredPrompt=e;

overlay.style.display="flex";

});

installBtn.addEventListener("click",async()=>{

if(!deferredPrompt) return;

deferredPrompt.prompt();

const result=await deferredPrompt.userChoice;

if(result.outcome==="accepted"){

localStorage.setItem("jobAppInstalled","true");

}

overlay.style.display="none";

deferredPrompt=null;

});

cancelBtn.addEventListener("click",()=>{

overlay.style.display="none";

});

window.addEventListener("appinstalled",()=>{

localStorage.setItem("jobAppInstalled","true");

overlay.style.display="none";

deferredPrompt=null;

console.log("App Installed");

});

window.addEventListener("load",()=>{

if(appInstalled()){

overlay.style.display="none";

}

});

</script>

</body>
</html>
