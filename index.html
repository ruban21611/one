<!doctype html>
<html lang="en">
<head>
 
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2563eb">

<link rel="apple-touch-icon"
href="icons/icon-192.png">

  <title>JOB APPLICATION</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      overflow:hidden;
      background:#f5f5f5;
    }

    /* Overlay */
    #installOverlay{
      position:fixed;
      inset:0;
      background:linear-gradient(135deg,#4285F4,#34A853);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      transition:all .8s ease;
    }

    .overlay-card{
      width:340px;
      background:#fff;
      border-radius:20px;
      padding:35px;
      text-align:center;
      box-shadow:0 15px 40px rgba(0,0,0,.25);
    }

    .overlay-card h1{
      font-size:28px;
      color:#222;
      margin-bottom:15px;
    }

    .overlay-card p{
      color:#666;
      line-height:1.6;
      margin-bottom:25px;
    }

    #installBtn{
      border:none;
      background:#4285F4;
      color:white;
      font-size:18px;
      padding:14px 35px;
      border-radius:50px;
      cursor:pointer;
      transition:.3s;
    }

    #installBtn:hover{
      transform:scale(1.05);
      background:#2d6cdf;
    }

    #installBtn:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    /* Fade Animation */
    .hideOverlay{
      opacity:0;
      transform:translateY(-100%);
      pointer-events:none;
    }

    /* Hide React until overlay disappears */
    #root{
      visibility:hidden;
    }

    #root.show{
      visibility:visible;
    }
  </style>
</head>

<body>


</script>

<script type="module" src="/src/main.tsx"></script>

</body>
</html>
